<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KanFlow – Task Board</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6aff;
    --accent2: #ff6a6a;
    --accent3: #6affd4;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --todo: #7c6aff;
    --progress: #ffaa6a;
    --done: #6affd4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
  }
  .theme-btn:hover { background: var(--border); }

  /* LIGHT THEME */
  body.light {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #ececf3;
    --border: #d8d8e8;
    --text: #0d0d0f;
    --muted: #8888a0;
  }

  /* BOARD */
  .board-wrap {
    padding: 28px 32px;
    min-height: calc(100vh - 64px);
    position: relative;
    z-index: 1;
  }
  .board-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 24px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 0.75rem;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    align-items: start;
  }

  /* COLUMN */
  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .column.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,106,255,0.2); }
  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .col-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .col-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .col-count {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .col-add-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    transition: color 0.2s;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .col-add-btn:hover { color: var(--text); background: var(--surface2); }
  .cards-area {
    padding: 12px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .empty-state {
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    padding: 20px 0;
    opacity: 0.6;
  }

  /* CARD */
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
    position: relative;
    animation: cardIn 0.25s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:active { cursor: grabbing; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.dragging { opacity: 0.4; transform: scale(0.97); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    line-height: 1.4;
    flex: 1;
  }
  .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
  .card:hover .card-actions { opacity: 1; }
  .card-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 3px 6px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .card-btn:hover { background: var(--border); color: var(--text); }
  .card-btn.del:hover { color: var(--accent2); }
  .card-desc {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 8px;
    line-height: 1.5;
  }
  .card-footer { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
  .priority-tag {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .priority-high { background: rgba(255,106,106,0.15); color: var(--accent2); }
  .priority-med { background: rgba(255,170,106,0.15); color: #ffaa6a; }
  .priority-low { background: rgba(106,255,212,0.15); color: var(--accent3); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group select option { background: var(--surface); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-cancel {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-cancel:hover { background: var(--border); }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
  }

  /* FEATURES BANNER */
  .features-banner {
    display: flex;
    gap: 10px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
  }
  .features-banner::-webkit-scrollbar { display: none; }
  .feature-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.78rem;
    white-space: nowrap;
    color: var(--muted);
    font-weight: 500;
  }
  .feature-pill span { font-size: 0.95rem; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .features-banner { padding: 10px 16px; }
    .board-wrap { padding: 16px; }
    .board { grid-template-columns: 1fr; }
    .search-box { width: 130px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Kan<span>Flow</span></div>
  <div class="header-actions">
    <input class="search-box" type="text" placeholder="🔍 Search tasks..." id="searchInput" oninput="renderBoard()"/>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌓</button>
  </div>
</header>

<div class="board-wrap">
  <div class="stats" id="stats"></div>
  <p class="board-title">My Workspace</p>
  <div class="board" id="board"></div>
</div>

<div class="features-banner">
  <div class="feature-pill"><span>➕</span> Add Tasks</div>
  <div class="feature-pill"><span>✏️</span> Edit & Delete</div>
  <div class="feature-pill"><span>🖱️</span> Drag & Drop between columns</div>
  <div class="feature-pill"><span>🔍</span> Search tasks</div>
  <div class="feature-pill"><span>🔴🟡🟢</span> Priority labels</div>
  <div class="feature-pill"><span>💾</span> Auto-saves after refresh</div>
  <div class="feature-pill"><span>🌓</span> Dark / Light theme</div>
  <div class="feature-pill"><span>📱</span> Mobile friendly</div>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modal-title">Add Task</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="task-title" placeholder="What needs to be done?" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="task-desc" placeholder="Add some details..."></textarea>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="task-priority">
        <option value="low">🟢 Low</option>
        <option value="med" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
  const COLS = [
    { id: 'todo',     label: 'Todo',        color: '#7c6aff' },
    { id: 'progress', label: 'In Progress',  color: '#ffaa6a' },
    { id: 'done',     label: 'Done',         color: '#6affd4' },
  ];

  let tasks = JSON.parse(localStorage.getItem('kanflow_tasks') || '[]');
  let editingId = null;
  let addingCol = null;
  let dragId = null;

  function save() {
    localStorage.setItem('kanflow_tasks', JSON.stringify(tasks));
  }

  function uid() {
    return Math.random().toString(36).slice(2) + Date.now();
  }

  function openModal(colId, taskId = null) {
    addingCol = colId;
    editingId = taskId;
    const modal = document.getElementById('modal-overlay');
    document.getElementById('modal-title').textContent = taskId ? 'Edit Task' : 'Add Task';
    if (taskId) {
      const t = tasks.find(t => t.id === taskId);
      document.getElementById('task-title').value = t.title;
      document.getElementById('task-desc').value = t.desc || '';
      document.getElementById('task-priority').value = t.priority || 'med';
    } else {
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-priority').value = 'med';
    }
    modal.style.display = 'flex';
    setTimeout(() => document.getElementById('task-title').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    editingId = null; addingCol = null;
  }

  function saveTask() {
    const title = document.getElementById('task-title').value.trim();
    if (!title) { document.getElementById('task-title').style.borderColor = '#ff6a6a'; return; }
    const desc = document.getElementById('task-desc').value.trim();
    const priority = document.getElementById('task-priority').value;
    if (editingId) {
      const t = tasks.find(t => t.id === editingId);
      t.title = title; t.desc = desc; t.priority = priority;
    } else {
      tasks.push({ id: uid(), col: addingCol, title, desc, priority });
    }
    save(); closeModal(); renderBoard();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); renderBoard();
  }

  function renderBoard() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const board = document.getElementById('board');
    board.innerHTML = '';

    const filtered = query
      ? tasks.filter(t => t.title.toLowerCase().includes(query) || (t.desc||'').toLowerCase().includes(query))
      : tasks;

    // Stats
    const stats = document.getElementById('stats');
    stats.innerHTML = `
      <div class="stat-chip"><span class="stat-num">${tasks.length}</span> Total Tasks</div>
      <div class="stat-chip"><span class="stat-num" style="color:#7c6aff">${tasks.filter(t=>t.col==='todo').length}</span> Todo</div>
      <div class="stat-chip"><span class="stat-num" style="color:#ffaa6a">${tasks.filter(t=>t.col==='progress').length}</span> In Progress</div>
      <div class="stat-chip"><span class="stat-num" style="color:#6affd4">${tasks.filter(t=>t.col==='done').length}</span> Done</div>
    `;

    COLS.forEach(col => {
      const colTasks = filtered.filter(t => t.col === col.id);
      const allColTasks = tasks.filter(t => t.col === col.id);

      const colEl = document.createElement('div');
      colEl.className = 'column';
      colEl.dataset.col = col.id;

      colEl.innerHTML = `
        <div class="col-header">
          <div class="col-label">
            <div class="col-dot" style="background:${col.color}"></div>
            ${col.label}
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="col-count">${allColTasks.length}</span>
            <button class="col-add-btn" onclick="openModal('${col.id}')">＋</button>
          </div>
        </div>
        <div class="cards-area" id="cards-${col.id}">
          ${colTasks.length === 0 ? `<div class="empty-state">No tasks here</div>` : ''}
        </div>
      `;

      board.appendChild(colEl);

      const area = document.getElementById(`cards-${col.id}`);

      // Drag over column
      colEl.addEventListener('dragover', e => {
        e.preventDefault();
        colEl.classList.add('drag-over');
      });
      colEl.addEventListener('dragleave', () => colEl.classList.remove('drag-over'));
      colEl.addEventListener('drop', e => {
        e.preventDefault();
        colEl.classList.remove('drag-over');
        if (dragId) {
          const t = tasks.find(t => t.id === dragId);
          if (t) { t.col = col.id; save(); renderBoard(); }
        }
      });

      colTasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'card';
        card.draggable = true;
        card.dataset.id = task.id;

        const priorityMap = { high: 'priority-high', med: 'priority-med', low: 'priority-low' };
        const priorityLabel = { high: '🔴 High', med: '🟡 Medium', low: '🟢 Low' };

        card.innerHTML = `
          <div class="card-top">
            <div class="card-title">${escapeHtml(task.title)}</div>
            <div class="card-actions">
              <button class="card-btn" onclick="openModal('${task.col}','${task.id}')" title="Edit">✏️</button>
              <button class="card-btn del" onclick="deleteTask('${task.id}')" title="Delete">🗑</button>
            </div>
          </div>
          ${task.desc ? `<div class="card-desc">${escapeHtml(task.desc)}</div>` : ''}
          <div class="card-footer">
            <span class="priority-tag ${priorityMap[task.priority||'med']}">${priorityLabel[task.priority||'med']}</span>
          </div>
        `;

        card.addEventListener('dragstart', () => {
          dragId = task.id;
          setTimeout(() => card.classList.add('dragging'), 0);
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          dragId = null;
        });

        area.appendChild(card);
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('kanflow_theme', document.body.classList.contains('light') ? 'light' : 'dark');
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Enter key to save
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modal-overlay').style.display === 'flex') {
      if (e.target.tagName !== 'TEXTAREA') saveTask();
    }
  });

  // Init
  if (localStorage.getItem('kanflow_theme') === 'light') document.body.classList.add('light');
  
  // Seed demo tasks if empty
  if (tasks.length === 0) {
    tasks = [
      { id: uid(), col: 'todo', title: 'Design landing page mockup', desc: 'Create wireframes for the homepage', priority: 'high' },
      { id: uid(), col: 'todo', title: 'Set up project repository', desc: '', priority: 'med' },
      { id: uid(), col: 'progress', title: 'Build Kanban board', desc: 'Implement drag and drop functionality', priority: 'high' },
      { id: uid(), col: 'progress', title: 'Write API documentation', desc: '', priority: 'low' },
      { id: uid(), col: 'done', title: 'Project requirements gathered', desc: 'All stakeholders aligned on scope', priority: 'med' },
    ];
    save();
  }

  renderBoard();
</script>
</body>
</html>
